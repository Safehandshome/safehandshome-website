# Netlify Configuration

# Form Settings
[build]
  command = "echo 'Static site - no build needed'"
  publish = "."

# Ensure blog post serves correctly
[[redirects]]
  from = "/power-washing-blog.html"
  to = "/power-washing-blog.html"
  status = 200

# Form Notifications - Email configuration
[[redirects]]
  from = "/contact"
  to = "/"
  status = 200

# Context for production
[context.production]
  environment = { SITE_NAME = "SafeHands Home & Tech Repair" }

# Redirect form success page
[[redirects]]
  from = "/success"
  to = "/"
  status = 200
